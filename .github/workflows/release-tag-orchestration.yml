name: Release Tag Orchestration

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: SemVer tag to orchestrate (vX.Y.Z). Required for manual runs.
        required: true
        type: string
      dry_run:
        description: Skip GitHub Release and NuGet publish steps.
        required: false
        default: true
        type: boolean
      npm_break_glass_authorization:
        description: "Optional incident authorization string for npm token fallback. Must be entered by vincentlaurila as: vincentlaurila:<tag>:single-release-incident"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  context:
    name: Resolve release context
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      release_version: ${{ steps.resolve.outputs.release_version }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      release_url: ${{ steps.resolve.outputs.release_url }}
      npm_break_glass_authorization: ${{ steps.resolve.outputs.npm_break_glass_authorization }}
    steps:
      - name: Resolve tag and dry-run mode
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            dry_run="${{ inputs.dry_run }}"
          else
            tag="${GITHUB_REF_NAME}"
            dry_run="false"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$tag' is invalid. Expected vX.Y.Z" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"
          echo "release_url=https://github.com/${{ github.repository }}/releases/tag/$tag" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "npm_break_glass_authorization=${{ inputs.npm_break_glass_authorization }}" >> "$GITHUB_OUTPUT"
          else
            echo "npm_break_glass_authorization=" >> "$GITHUB_OUTPUT"
          fi

  preflight:
    name: Preflight guards
    runs-on: ubuntu-latest
    needs: context
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate release tag policy
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            bash scripts/validate-release-tag.sh --tag "${{ needs.context.outputs.tag }}" --allow-missing-tag
          else
            bash scripts/validate-release-tag.sh --tag "${{ needs.context.outputs.tag }}"
          fi

      - name: Restore
        run: dotnet restore Veeling.slnx

      - name: Build
        run: dotnet build Veeling.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Veeling.slnx --configuration Release --no-build --verbosity normal

      - name: Integrity preflight
        shell: bash
        env:
          VEELING_NUGET_SIGN_CERT_PATH: ${{ vars.VEELING_NUGET_SIGN_CERT_PATH }}
          VEELING_NUGET_SIGN_CERT_PASSWORD: ${{ secrets.VEELING_NUGET_SIGN_CERT_PASSWORD }}
          VEELING_NUGET_SIGN_TIMESTAMP_URL: ${{ vars.VEELING_NUGET_SIGN_TIMESTAMP_URL }}
          VEELING_GPG_KEY_ID: ${{ vars.VEELING_GPG_KEY_ID }}
          VEELING_REPOSITORY_URL: ${{ vars.VEELING_REPOSITORY_URL }}
        run: |
          set -euo pipefail
          allow_missing_tag_arg=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            allow_missing_tag_arg="--allow-missing-tag"
          fi

          bash scripts/release-archives.sh \
            --tag "${{ needs.context.outputs.tag }}" \
            ${allow_missing_tag_arg} \
            --signing-mode optional \
            --provenance-mode required \
            --sbom-mode optional \
            --validate-integrity-config

  package-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs:
      - context
      - preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Generate archives + package + integrity files
        shell: bash
        env:
          VEELING_NUGET_SIGN_CERT_PATH: ${{ vars.VEELING_NUGET_SIGN_CERT_PATH }}
          VEELING_NUGET_SIGN_CERT_PASSWORD: ${{ secrets.VEELING_NUGET_SIGN_CERT_PASSWORD }}
          VEELING_NUGET_SIGN_TIMESTAMP_URL: ${{ vars.VEELING_NUGET_SIGN_TIMESTAMP_URL }}
          VEELING_GPG_KEY_ID: ${{ vars.VEELING_GPG_KEY_ID }}
          VEELING_REPOSITORY_URL: ${{ vars.VEELING_REPOSITORY_URL }}
        run: |
          set -euo pipefail
          allow_missing_tag_arg=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            allow_missing_tag_arg="--allow-missing-tag"
          fi

          bash scripts/release-archives.sh \
            --tag "${{ needs.context.outputs.tag }}" \
            ${allow_missing_tag_arg} \
            --output ./artifacts/releases \
            --nupkg-output ./artifacts/nupkg \
            --signing-mode optional \
            --provenance-mode required \
            --sbom-mode optional

      - name: Compose release notes linkage
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.context.outputs.tag }}"
          cat > ./artifacts/release-notes.md <<EOF
          ## Veeling ${version}

          - Canonical changelog: https://github.com/${{ github.repository }}/blob/${version}/CHANGELOG.md
          - Installation/update guide: https://github.com/${{ github.repository }}/blob/${version}/docs/installation.md
          - Release metadata contract: https://github.com/${{ github.repository }}/blob/${version}/docs/release-metadata.md

          Artifacts in this release are generated by \
          \.github/workflows/release-tag-orchestration.yml and \
          scripts/release-archives.sh.
          EOF

      - name: Stage release bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./artifacts/release-bundle
          cp ./artifacts/releases/* ./artifacts/release-bundle/
          cp ./artifacts/nupkg/*.nupkg ./artifacts/release-bundle/
          cp ./artifacts/release-notes.md ./artifacts/release-bundle/release-notes.md

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Stage npm platform payloads from release archives
        shell: pwsh
        run: |
          ./scripts/stage-npm-artifacts.ps1 -Version "${{ needs.context.outputs.release_version }}" -ArchiveInput ./artifacts/releases -NpmRoot ./npm -Clean

      - name: Pack npm workspace packages
        shell: bash
        working-directory: ./npm
        run: |
          set -euo pipefail
          mkdir -p ../artifacts/npm
          npm pack --workspaces --include-workspace-root=false --pack-destination ../artifacts/npm

      - name: Verify npm tarball content safety
        shell: bash
        run: |
          set -euo pipefail
          node ./scripts/verify-npm-tarball-contents.mjs ./artifacts/npm/*.tgz

      - name: Add npm tarballs to release bundle
        shell: bash
        run: |
          set -euo pipefail
          cp ./artifacts/npm/*.tgz ./artifacts/release-bundle/

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.context.outputs.tag }}
          path: artifacts/release-bundle/*

  smoke-nuget-tool:
    name: Smoke (NuGet global tool install/update)
    runs-on: ubuntu-latest
    needs:
      - context
      - package-artifacts
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.context.outputs.tag }}
          path: ./artifacts/release-bundle

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Clean-machine NuGet tool smoke (install + update)
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.context.outputs.tag }}"
          version="${version#v}"
          source_dir="${GITHUB_WORKSPACE}/artifacts/release-bundle"

          export HOME="${RUNNER_TEMP}/veeling-smoke-home"
          export DOTNET_CLI_HOME="${RUNNER_TEMP}/veeling-smoke-dotnet-home"
          export NUGET_PACKAGES="${RUNNER_TEMP}/veeling-smoke-nuget-packages"
          export PATH="${DOTNET_CLI_HOME}/.dotnet/tools:${PATH}"

          rm -rf "$HOME" "$DOTNET_CLI_HOME" "$NUGET_PACKAGES"
          mkdir -p "$HOME" "$DOTNET_CLI_HOME" "$NUGET_PACKAGES"

          dotnet tool install --global veeling --add-source "$source_dir" --version "$version" --ignore-failed-sources
          installed_version="$(veeling --version)"
          [[ "$installed_version" == "$version" || "$installed_version" == "$version"+* ]] || { echo "Expected version $version (optionally with build metadata), got $installed_version" >&2; exit 1; }

          dotnet tool update --global veeling --add-source "$source_dir" --version "$version" --ignore-failed-sources
          updated_version="$(veeling --version)"
          [[ "$updated_version" == "$version" || "$updated_version" == "$version"+* ]] || { echo "Expected updated version $version (optionally with build metadata), got $updated_version" >&2; exit 1; }

  smoke-archive-linux:
    name: Smoke (archive path linux-x64 install/update)
    runs-on: ubuntu-latest
    needs:
      - context
      - package-artifacts
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.context.outputs.tag }}
          path: ./artifacts/release-bundle

      - name: Archive smoke (install + update by replacement)
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.context.outputs.tag }}"
          version="${version#v}"
          archive="./artifacts/release-bundle/veeling-${version}-linux-x64.tar.gz"
          root="${RUNNER_TEMP}/veeling-archive-smoke"
          current_dir="${root}/current"

          rm -rf "$root"
          mkdir -p "$root"

          tar -xzf "$archive" -C "$root"
          mv "$root/veeling-${version}-linux-x64" "$current_dir"
          executable_path="${current_dir}/Veeling.CLI"

          installed_version="$("${executable_path}" --version)"
          [[ "$installed_version" == "$version" || "$installed_version" == "$version"+* ]] || { echo "Expected version $version (optionally with build metadata), got $installed_version" >&2; exit 1; }

          rm -rf "$current_dir"
          tar -xzf "$archive" -C "$root"
          mv "$root/veeling-${version}-linux-x64" "$current_dir"

          updated_version="$("${executable_path}" --version)"
          [[ "$updated_version" == "$version" || "$updated_version" == "$version"+* ]] || { echo "Expected updated version $version (optionally with build metadata), got $updated_version" >&2; exit 1; }

  smoke-archive-windows:
    name: Smoke (archive path win-x64 install/update)
    runs-on: windows-latest
    needs:
      - context
      - package-artifacts
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.context.outputs.tag }}
          path: .\artifacts\release-bundle

      - name: Archive smoke (install + update by replacement)
        shell: pwsh
        run: |
          $version = "${{ needs.context.outputs.tag }}".TrimStart('v')
          $archive = ".\artifacts\release-bundle\veeling-$version-win-x64.zip"
          $root = Join-Path $env:RUNNER_TEMP "veeling-archive-smoke-win"
          $extractRoot = Join-Path $root "extract"
          $current = Join-Path $root "current"

          if (Test-Path $root) { Remove-Item $root -Recurse -Force }
          New-Item -ItemType Directory -Path $extractRoot -Force | Out-Null

          Expand-Archive -Path $archive -DestinationPath $extractRoot -Force
          Move-Item -Path (Join-Path $extractRoot "veeling-$version-win-x64") -Destination $current -Force

          $installed = (& (Join-Path $current "Veeling.CLI.exe") --version).Trim()
          if (-not ($installed -eq $version -or $installed.StartsWith("$version+"))) { throw "Expected version $version (optionally with build metadata), got $installed" }

          Remove-Item $current -Recurse -Force
          Expand-Archive -Path $archive -DestinationPath $extractRoot -Force
          Move-Item -Path (Join-Path $extractRoot "veeling-$version-win-x64") -Destination $current -Force

          $updated = (& (Join-Path $current "Veeling.CLI.exe") --version).Trim()
          if (-not ($updated -eq $version -or $updated.StartsWith("$version+"))) { throw "Expected updated version $version (optionally with build metadata), got $updated" }

  smoke-npm-linux:
    name: Smoke (npm local dev-dependency path linux-x64)
    runs-on: ubuntu-latest
    needs:
      - context
      - package-artifacts
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.context.outputs.tag }}
          path: ./artifacts/release-bundle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: npm install smoke (linux)
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.context.outputs.release_version }}"
          node ./scripts/smoke-npm-install.mjs \
            "./artifacts/release-bundle/veeling-cli-linux-x64-${version}.tgz" \
            "./artifacts/release-bundle/veeling-cli-${version}.tgz"

  smoke-npm-windows:
    name: Smoke (npm local dev-dependency path win-x64)
    runs-on: windows-latest
    needs:
      - context
      - package-artifacts
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.context.outputs.tag }}
          path: .\artifacts\release-bundle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: npm install smoke (windows)
        shell: pwsh
        run: |
          $version = "${{ needs.context.outputs.release_version }}"
          node .\scripts\smoke-npm-install.mjs ".\artifacts\release-bundle\veeling-cli-win32-x64-$version.tgz" ".\artifacts\release-bundle\veeling-cli-$version.tgz"

  smoke-npm-macos-arm64:
    name: Smoke (npm local dev-dependency path darwin-arm64)
    runs-on: macos-14
    needs:
      - context
      - package-artifacts
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.context.outputs.tag }}
          path: ./artifacts/release-bundle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: npm install smoke (macOS arm64)
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.context.outputs.release_version }}"
          node ./scripts/smoke-npm-install.mjs \
            "./artifacts/release-bundle/veeling-cli-darwin-arm64-${version}.tgz" \
            "./artifacts/release-bundle/veeling-cli-${version}.tgz"

  smoke-npm-macos-x64:
    name: Smoke (npm local dev-dependency path darwin-x64)
    runs-on: macos-13
    needs:
      - context
      - package-artifacts
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.context.outputs.tag }}
          path: ./artifacts/release-bundle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: npm install smoke (macOS x64)
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.context.outputs.release_version }}"
          node ./scripts/smoke-npm-install.mjs \
            "./artifacts/release-bundle/veeling-cli-darwin-x64-${version}.tgz" \
            "./artifacts/release-bundle/veeling-cli-${version}.tgz"

  publish-github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - context
      - package-artifacts
      - smoke-nuget-tool
      - smoke-archive-linux
      - smoke-archive-windows
      - smoke-npm-linux
      - smoke-npm-windows
      - smoke-npm-macos-arm64
      - smoke-npm-macos-x64
    if: needs.context.outputs.dry_run != 'true'
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.context.outputs.tag }}
          path: ./artifacts/release-bundle

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.context.outputs.tag }}
          name: ${{ needs.context.outputs.tag }}
          body_path: ./artifacts/release-bundle/release-notes.md
          files: |
            ./artifacts/release-bundle/*.nupkg
            ./artifacts/release-bundle/*.tgz
            ./artifacts/release-bundle/*.zip
            ./artifacts/release-bundle/*.tar.gz
            ./artifacts/release-bundle/*.asc
            ./artifacts/release-bundle/SHA256SUMS
            ./artifacts/release-bundle/provenance.intoto.json
            ./artifacts/release-bundle/sbom.*.cdx.json
          fail_on_unmatched_files: false

  publish-nuget:
    name: Publish NuGet package (guarded)
    runs-on: ubuntu-latest
    needs:
      - context
      - package-artifacts
      - smoke-nuget-tool
      - smoke-archive-linux
      - smoke-archive-windows
    if: needs.context.outputs.dry_run != 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.context.outputs.tag }}
          path: ./artifacts/release-bundle

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish NuGet package (Trusted Publishing preferred, API key fallback)
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          packages=(./artifacts/release-bundle/*.nupkg)
          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "No .nupkg file found in artifact bundle." >&2
            exit 1
          fi

          set +e
          dotnet nuget push "${packages[@]}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          trusted_exit=$?
          set -e

          if [[ $trusted_exit -eq 0 ]]; then
            echo "NuGet publish succeeded via Trusted Publishing (OIDC)."
            exit 0
          fi

          echo "Trusted Publishing (OIDC) publish attempt failed with exit code ${trusted_exit}."
          if [[ -z "${NUGET_API_KEY:-}" ]]; then
            echo "NUGET_API_KEY fallback is not configured; failing closed."
            exit "$trusted_exit"
          fi

          echo "Attempting fallback NuGet publish via API key (explicit contingency path)."
          dotnet nuget push "${packages[@]}" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  publish-npm:
    name: Publish npm packages (guarded)
    runs-on: ubuntu-latest
    needs:
      - context
      - package-artifacts
      - smoke-npm-linux
      - smoke-npm-windows
      - smoke-npm-macos-arm64
      - smoke-npm-macos-x64
    if: needs.context.outputs.dry_run != 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.context.outputs.tag }}
          path: ./artifacts/release-bundle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Resolve npm token fallback incident authorization
        id: fallback
        shell: bash
        run: |
          set -euo pipefail

          auth_input="${{ needs.context.outputs.npm_break_glass_authorization }}"
          expected="vincentlaurila:${{ needs.context.outputs.tag }}:single-release-incident"
          allow_fallback="false"

          if [[ -n "$auth_input" ]]; then
            if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
              echo "Break-glass authorization is only accepted in workflow_dispatch runs." >&2
              exit 1
            fi

            if [[ "${{ github.actor }}" != "vincentlaurila" ]]; then
              echo "Only vincentlaurila may authorize npm token fallback." >&2
              exit 1
            fi

            if [[ "$auth_input" != "$expected" ]]; then
              echo "Invalid break-glass authorization value. Expected exact format for this tag: $expected" >&2
              exit 1
            fi

            allow_fallback="true"
          fi

          echo "allow_fallback=$allow_fallback" >> "$GITHUB_OUTPUT"

      - name: Publish npm package family (Trusted Publishing primary, token fallback gated)
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          version="${{ needs.context.outputs.release_version }}"
          package_entries=(
            "@veeling/cli-win32-x64|./artifacts/release-bundle/veeling-cli-win32-x64-${version}.tgz"
            "@veeling/cli-linux-x64|./artifacts/release-bundle/veeling-cli-linux-x64-${version}.tgz"
            "@veeling/cli-darwin-x64|./artifacts/release-bundle/veeling-cli-darwin-x64-${version}.tgz"
            "@veeling/cli-darwin-arm64|./artifacts/release-bundle/veeling-cli-darwin-arm64-${version}.tgz"
            "@veeling/cli|./artifacts/release-bundle/veeling-cli-${version}.tgz"
          )

          is_already_published() {
            local package_name="$1"
            npm view "${package_name}@${version}" version --json >/dev/null 2>&1
          }

          publish_one() {
            local package_name="$1"
            local tarball="$2"
            local trusted_log

            trusted_log="$(mktemp)"

            set +e
            npm publish "$tarball" --access public --provenance 2>&1 | tee "$trusted_log"
            trusted_exit=$?
            set -e

            if [[ $trusted_exit -eq 0 ]]; then
              echo "npm publish succeeded via Trusted Publishing for ${package_name}@${version}"
              return 0
            fi

            if grep -Eiq "previously published|cannot publish over the previously published versions" "$trusted_log"; then
              echo "${package_name}@${version} already exists. Treating as idempotent success."
              rm -f "$trusted_log"
              return 0
            fi

            echo "Trusted Publishing publish attempt failed for ${package_name}@${version} with exit code $trusted_exit"
            if [[ "${{ steps.fallback.outputs.allow_fallback }}" != "true" ]]; then
              echo "Fallback is disabled by policy. Failing closed."
              rm -f "$trusted_log"
              return "$trusted_exit"
            fi

            if [[ -z "${NPM_TOKEN:-}" ]]; then
              echo "Fallback authorized but NPM_TOKEN is not configured. Failing closed."
              rm -f "$trusted_log"
              return "$trusted_exit"
            fi

            if ! grep -Eiq "trusted publishing|oidc|id token|provenance|authentication|auth" "$trusted_log"; then
              echo "Trusted publish failed for a non-auth/non-trusted-publishing reason; fallback blocked by safety policy."
              rm -f "$trusted_log"
              return "$trusted_exit"
            fi

            rm -f "$trusted_log"

            echo "Executing authorized single-release-incident npm token fallback for ${package_name}@${version}"
            NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish "$tarball" --access public --provenance
          }

          for entry in "${package_entries[@]}"; do
            package_name="${entry%%|*}"
            tarball="${entry#*|}"

            if [[ ! -f "$tarball" ]]; then
              echo "Missing expected npm tarball: $tarball" >&2
              exit 1
            fi

            if is_already_published "$package_name"; then
              echo "${package_name}@${version} already published before this run; skipping publish."
              continue
            fi

            publish_one "$package_name" "$tarball"
          done

  release-summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs:
      - context
      - preflight
      - package-artifacts
      - smoke-nuget-tool
      - smoke-archive-linux
      - smoke-archive-windows
      - smoke-npm-linux
      - smoke-npm-windows
      - smoke-npm-macos-arm64
      - smoke-npm-macos-x64
      - publish-github-release
      - publish-nuget
      - publish-npm
    if: always()
    steps:
      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## Release orchestration summary"
            echo ""
            echo "- Tag: ${{ needs.context.outputs.tag }}"
